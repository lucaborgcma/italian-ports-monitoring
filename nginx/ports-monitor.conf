server {
    listen 80;
    listen [::]:80;
    server_name lucaborg.it www.lucaborg.it;

    # Certbot aggiungerà automaticamente la sezione SSL dopo il comando certbot

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts per scraping lento
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # File statici (CSS, JS, immagini)
    location /static/ {
        alias /home/deploy/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/ports-monitor-access.log;
    error_log /var/log/nginx/ports-monitor-error.log;

    # Sicurezza headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Limita dimensione upload
    client_max_body_size 10M;
}
