<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navi Aperte — Port Monitor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }

  .header {
    background: #002B5C; color: #fff;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  .header-title { font-size: 1.35rem; font-weight: bold; letter-spacing: .5px; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .btn-refresh {
    background: #E87722; color: #fff; border: none;
    padding: 9px 20px; border-radius: 4px;
    font-size: .9rem; font-weight: bold; cursor: pointer;
    transition: background .15s;
  }
  .btn-refresh:hover { background: #cf6510; }

  .btn-pos {
    background: #1565C0; color: #fff; border: none;
    padding: 9px 16px; border-radius: 4px;
    font-size: .9rem; font-weight: bold; cursor: pointer;
    transition: background .15s;
  }
  .btn-pos:hover { background: #0d47a1; }
  .btn-pos.active { background: #0d47a1; }

  .map-wrap { max-width: 1440px; margin: 20px auto 0; padding: 0 20px; }
  #italy-map { height: 420px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  #ais-wrap { display: none; margin-top: 8px; }
  #ais-wrap iframe { width: 100%; height: 480px; border: none; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

  .grid {
    display: grid; grid-template-columns: 1fr;
    gap: 20px; padding: 20px;
    max-width: 1440px; margin: 0 auto;
  }

  .port-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.09); }
  .port-header { background: #002B5C; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .port-name { font-size: 1.1rem; font-weight: bold; }

  .table-wrap { overflow-x: auto; padding: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #dee2e6; }
  td { padding: 8px 10px; border-bottom: 1px solid #eee; }

  .eta-ok    { color: #28a745; font-weight: bold; }
  .eta-warn  { color: #fd7e14; font-weight: bold; }
  .eta-alert { color: #dc3545; font-weight: bold; }

  .vessel-link { color: inherit; text-decoration: none; }
  .vessel-link:hover { text-decoration: underline; color: #1565C0; }

  .vessel-marker { font-size: 20px; line-height: 1; display: block; transform-origin: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🚢 NAVI APERTE — Port Monitor</div>
  <div class="header-right">
    <span style="font-size:0.8rem; opacity:0.7;">👁 {{ page_views }} visite</span>
    <button class="btn-pos" id="btn-pos" onclick="loadPositions()">📍 Live AIS</button>
    <button class="btn-refresh" onclick="refreshAll()">🔄 Aggiorna Tutto</button>
    <a href="/logout" style="color: white; text-decoration: none; font-size: 0.9rem;">Logout</a>
  </div>
</div>

<div class="map-wrap">
  <div id="italy-map"></div>
  <div id="ais-wrap">
    <iframe id="ais-frame" src="" allowfullscreen></iframe>
  </div>
</div>

{% for group in port_groups %}
<div style="max-width: 1440px; margin: 30px auto 0; padding: 0 20px; font-weight: bold; color: #002B5C; text-transform: uppercase; letter-spacing: 1px;">
  {{ group.label }}
</div>
<div class="grid">
  {% for port in group.ports %}
  <div class="port-card" id="card-{{ port.key }}">
    <div class="port-header">
      <span class="port-name">{{ port.name }}</span>
      <button onclick="refreshPort('{{ port.key }}')" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;">Refresh</button>
    </div>
    <div class="table-wrap" id="body-{{ port.key }}">
      <div style="padding: 20px; text-align: center; color: #888;">In attesa di dati...</div>
    </div>
  </div>
  {% endfor %}
</div>
{% endfor %}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('italy-map').setView([42.5, 12.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const PORT_COORDS = {
  GENOVA_PSA: [44.413, 8.920], SPINELLI: [44.406, 8.927], GENOVA_SECH: [44.409, 8.912],
  SAN_GIORGIO: [44.411, 8.916], LA_SPEZIA: [44.104, 9.831], LIVORNO: [43.548, 10.308],
  VENEZIA: [45.430, 12.340], TRIESTE: [45.649, 13.802],
  NAPOLI: [40.841, 14.268], CONATECO: [40.843, 14.285], SALERNO: [40.692, 14.771]
};

// Porto markers (fissi)
for (const key in PORT_COORDS) {
  L.circleMarker(PORT_COORDS[key], { radius: 8, color: '#002B5C', fillColor: '#002B5C', fillOpacity: 0.8 })
    .bindTooltip(key.replace(/_/g,' '), {permanent: false})
    .addTo(map);
}

// Layer per posizioni AIS (dinamico)
const vesselLayer = L.layerGroup().addTo(map);

// Raccolta nomi navi per AISHub
const allVesselNames = new Set();

function semClass(s) {
  if (!s) return '';
  let t = s.trim();
  t = t.replace(/^(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1');
  t = t.replace(' ', 'T');
  const d = new Date(t);
  if (isNaN(d)) return '';
  const h = (d - Date.now()) / 3600000;
  if (h < 0)  return 'eta-alert';
  if (h < 24) return 'eta-warn';
  return 'eta-ok';
}

function dateCell(val) {
  if (!val) return '<td>—</td>';
  const cls = semClass(val);
  return `<td><span class="${cls}">${val}</span></td>`;
}

const FIELD_LABELS = {
  nave: 'Nave', viaggio: 'Viaggio', servizio: 'Servizio',
  eta: 'ETA', etb: 'ETB', etd: 'ETD',
  accettazione: 'Accettazione', fine_accettazione: 'Fine Acc.',
  chiusura: 'Chiusura', reefer: 'Reefer', imo: 'IMO', status: 'Stato',
  imo_reefer: 'Reefer Acc.', nota: 'Note'
};
const FIELD_ORDER = ['nave','viaggio','servizio','eta','etb','etd',
                     'accettazione','fine_accettazione','chiusura','reefer','imo','imo_reefer','status','nota'];
const SKIP_FIELDS = new Set(['porto','port_code','is_new']);
const DATE_FIELDS = new Set(['eta','etb','etd','accettazione','fine_accettazione','chiusura']);

function renderTable(key, result) {
  const body = document.getElementById('body-' + key);
  if (result.error) {
    body.innerHTML = `<div style="padding:10px; color:#c62828; border-left:4px solid #c62828; background:#fdecea;">⚠️ ${result.message || 'Errore'}</div>`;
    return;
  }
  const rows = result.data || [];
  if (rows.length === 0) {
    body.innerHTML = '<div style="padding:20px; text-align:center; color:#999; font-style:italic;">Nessuna nave in porto</div>';
    return;
  }

  // Raccogli nomi per AISHub
  rows.forEach(r => { if (r.nave) allVesselNames.add(r.nave.trim()); });

  const present = new Set();
  rows.forEach(r => Object.keys(r).forEach(k => { if (!SKIP_FIELDS.has(k)) present.add(k); }));
  const fields = FIELD_ORDER.filter(f => present.has(f));
  present.forEach(f => { if (!FIELD_ORDER.includes(f)) fields.push(f); });

  let html = '<div style="overflow-x:auto"><table><thead><tr>'
    + fields.map(f => `<th>${FIELD_LABELS[f] || f}</th>`).join('') + '</tr></thead><tbody>';

  rows.forEach(r => {
    const isNew = r.is_new;
    html += `<tr${isNew ? ' style="background:#f0fff4"' : ''}>`;
    fields.forEach(f => {
      const val = r[f];
      if (f === 'nave') {
        const badge = isNew ? ' <span style="background:#e8f5e9;color:#1b7e34;font-size:.65rem;padding:1px 5px;border-radius:3px;font-weight:bold">NEW</span>' : '';
        const link = `https://www.marinetraffic.com/en/ais/index/search/all/keyword:${encodeURIComponent(val||'')}`;
        html += `<td><a href="${link}" target="_blank" class="vessel-link" title="Cerca su MarineTraffic"><b>${val||'—'}</b> 🔗</a>${badge}</td>`;
      } else if (DATE_FIELDS.has(f)) {
        html += dateCell(val);
      } else {
        html += `<td style="color:#555">${val||'—'}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  body.innerHTML = html;
}

async function refreshPort(key) {
  const body = document.getElementById('body-' + key);
  body.innerHTML = '<div style="padding:20px; text-align:center;">Aggiornamento...</div>';
  try {
    const res = await fetch('/refresh/' + key);
    const data = await res.json();
    renderTable(key, data.result);
  } catch (e) {
    body.innerHTML = '<div style="padding:20px; color:red;">Errore!</div>';
  }
}

function refreshAll() {
  allVesselNames.clear();
  const keys = Object.keys(PORT_COORDS);
  keys.forEach(k => refreshPort(k));
}

// ---- VesselFinder live AIS toggle ----
let aisVisible = false;
function loadPositions() {
  const btn = document.getElementById('btn-pos');
  const wrap = document.getElementById('ais-wrap');
  const frame = document.getElementById('ais-frame');
  aisVisible = !aisVisible;
  if (aisVisible) {
    if (!frame.src || frame.src === window.location.href) {
      frame.src = 'https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:42.5/centerx:12.5/maptype:4/shownames:true/mmsi:0/shipid:0/fleet:/fleet_id:/vtypes:/showmenu:/remember:false';
    }
    wrap.style.display = 'block';
    btn.textContent = '🗺️ Nascondi AIS';
    btn.classList.add('active');
  } else {
    wrap.style.display = 'none';
    btn.textContent = '📍 Live AIS';
    btn.classList.remove('active');
  }
}

window.onload = refreshAll;
</script>
</body>
</html>
